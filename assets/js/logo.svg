<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle for sun -->
  <circle cx="30" cy="30" r="25" fill="#27ae60" opacity="0.2"/>
  
  <!-- Sun rays -->
  <line x1="30" y1="5" x2="30" y2="2" stroke="#27ae60" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="55" x2="30" y2="58" stroke="#27ae60" stroke-width="2" stroke-linecap="round"/>
  <line x1="5" y1="30" x2="2" y2="30" stroke="#27ae60" stroke-width="2" stroke-linecap="round"/>
  <line x1="55" y1="30" x2="58" y2="30" stroke="#27ae60" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Diagonal rays -->
  <line x1="12" y1="12" x2="9" y2="9" stroke="#27ae60" stroke-width="2" stroke-linecap="round"/>
  <line x1="48" y1="48" x2="51" y2="51" stroke="#27ae60" stroke-width="2" stroke-linecap="round"/>
  <line x1="48" y1="12" x2="51" y2="9" stroke="#27ae60" stroke-width="2" stroke-linecap="round"/>
  <line x1="12" y1="48" x2="9" y2="51" stroke="#27ae60" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Sun circle -->
  <circle cx="30" cy="30" r="15" fill="#27ae60" stroke="#2ecc71" stroke-width="2"/>
  
  <!-- Text -->
  <text x="70" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#27ae60">
    Solar
  </text>
  <text x="70" y="45" font-family="Arial, sans-serif" font-size="12" fill="#2ecc71">
    Energy
  </text>
</svg>
